<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Main fox head - teal geometric shape -->
  <!-- Left ear -->
  <polygon points="20,45 35,5 50,35" fill="#5EEAD4"/>
  <!-- Right ear -->
  <polygon points="80,45 65,5 50,35" fill="#5EEAD4"/>
  <!-- Upper face -->
  <polygon points="20,45 50,35 80,45 75,60 50,55 25,60" fill="#5EEAD4"/>
  <!-- Lower face/snout -->
  <polygon points="25,60 50,55 75,60 50,95" fill="#5EEAD4"/>

  <!-- Purple jaw accents - left -->
  <polygon points="20,45 25,60 50,95 40,70 35,55" fill="#8B5CF6"/>
  <!-- Purple jaw accents - right -->
  <polygon points="80,45 75,60 50,95 60,70 65,55" fill="#8B5CF6"/>

  <!-- Inner dark shapes -->
  <!-- Left eye area -->
  <polygon points="30,45 42,35 50,50 38,55" fill="#0F172A"/>
  <!-- Right eye area -->
  <polygon points="70,45 58,35 50,50 62,55" fill="#0F172A"/>
  <!-- Nose/snout line -->
  <polygon points="47,50 53,50 50,80 50,80" fill="#0F172A"/>
  <polygon points="48,48 52,48 50,75" fill="#0F172A"/>
</svg>
